name: ad-lp-apply-daily

# P2: 24h無人運用の横展開。毎朝9:05 JSTにad-lp-apply-queue.mdの可逆項目を反映。
# JST 9:05 = UTC 0:05（他ループとのpush競合を減らすため分をずらしてある）
on:
  schedule:
    - cron: "5 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ad-lp-apply-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout orchestrator (public, scripts only)
        uses: actions/checkout@v7

      - name: Setup SSH deploy keys (config + ai-business-ops + sales-research-tool + meta-ads, one host-alias per repo)
        env:
          CONFIG_DEPLOY_KEY: ${{ secrets.CONFIG_DEPLOY_KEY }}
          AI_BUSINESS_OPS_DEPLOY_KEY: ${{ secrets.AI_BUSINESS_OPS_DEPLOY_KEY }}
          SALES_RESEARCH_DEPLOY_KEY: ${{ secrets.SALES_RESEARCH_DEPLOY_KEY }}
          META_ADS_DEPLOY_KEY: ${{ secrets.META_ADS_DEPLOY_KEY }}
        run: |
          chmod +x scripts/setup-ssh-keys.sh
          scripts/setup-ssh-keys.sh

      - name: Checkout private config repo via deploy key (SSH)
        run: |
          git clone --depth 1 --branch main git@config-gh:yusuken10121990-hub/ai-ops-config.git config

      - name: Checkout ai-business (ai-business-ops + sales-research-tool + meta-ads)
        run: |
          chmod +x scripts/checkout-ai-business.sh
          scripts/checkout-ai-business.sh

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"

      - name: Install deps (google-ads scripts use client.js -> needs its own deps via ai-business/google-ads if present; sales-research-tool for any local build scripts)
        run: |
          if [ -f "${AI_BUSINESS_DIR}/google-ads/package.json" ]; then
            (cd "${AI_BUSINESS_DIR}/google-ads" && (npm ci --no-audit --no-fund || npm install --no-audit --no-fund))
          fi
          if [ -f "${AI_BUSINESS_DIR}/sales-research-tool/package.json" ]; then
            (cd "${AI_BUSINESS_DIR}/sales-research-tool" && (npm ci --no-audit --no-fund || npm install --no-audit --no-fund))
          fi

      - name: Run ad-lp-apply-daily
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GATE_URL: ${{ secrets.GATE_URL }}
          GATE_AGENT_KEY: ${{ secrets.GATE_AGENT_KEY }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          # 2026-07-19 owner-todos.md google-ads-secrets-and-workflow-fix: this step previously
          # had no META_*/GOOGLE_ADS_* wiring at all, so meta-ads/google-ads scripts silently
          # ran with no credentials (0 items applied, 3 days straight). Same pattern as
          # ad-pdca-daily.yml below.
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          META_SYSTEM_USER_TOKEN: ${{ secrets.META_SYSTEM_USER_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          META_API_VERSION: ${{ secrets.META_API_VERSION }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_IG_ACCOUNT_ID: ${{ secrets.META_IG_ACCOUNT_ID }}
          META_PIXEL_ID: ${{ secrets.META_PIXEL_ID }}
          # Google Ads API credentials (ai-business/google-ads/.env locally). Set via:
          #   gh secret set GOOGLE_ADS_DEVELOPER_TOKEN -R yusuken10121990-hub/ai-ops-orchestrator
          #   gh secret set GOOGLE_ADS_CLIENT_ID -R yusuken10121990-hub/ai-ops-orchestrator
          #   gh secret set GOOGLE_ADS_CLIENT_SECRET -R yusuken10121990-hub/ai-ops-orchestrator
          #   gh secret set GOOGLE_ADS_REFRESH_TOKEN -R yusuken10121990-hub/ai-ops-orchestrator
          #   gh secret set GOOGLE_ADS_LOGIN_CUSTOMER_ID -R yusuken10121990-hub/ai-ops-orchestrator
          #   gh secret set GOOGLE_ADS_CUSTOMER_ID -R yusuken10121990-hub/ai-ops-orchestrator
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
        run: |
          chmod +x scripts/run-loop.sh
          # meta-ads/google-ads scripts load .env via dotenv; CI has no .env file (gitignored),
          # so write one from the secrets above (same approach as ad-pdca-daily.yml).
          if [ -n "${META_SYSTEM_USER_TOKEN:-}" ]; then
            ENV_FILE="${AI_BUSINESS_DIR}/meta-ads/.env"
            : > "${ENV_FILE}"
            printf 'META_APP_ID=%s\n' "${META_APP_ID}" >> "${ENV_FILE}"
            printf 'META_APP_SECRET=%s\n' "${META_APP_SECRET}" >> "${ENV_FILE}"
            printf 'META_SYSTEM_USER_TOKEN=%s\n' "${META_SYSTEM_USER_TOKEN}" >> "${ENV_FILE}"
            printf 'META_AD_ACCOUNT_ID=%s\n' "${META_AD_ACCOUNT_ID}" >> "${ENV_FILE}"
            printf 'META_API_VERSION=%s\n' "${META_API_VERSION:-v21.0}" >> "${ENV_FILE}"
            printf 'META_PAGE_ID=%s\n' "${META_PAGE_ID}" >> "${ENV_FILE}"
            printf 'META_IG_ACCOUNT_ID=%s\n' "${META_IG_ACCOUNT_ID}" >> "${ENV_FILE}"
            printf 'META_PIXEL_ID=%s\n' "${META_PIXEL_ID}" >> "${ENV_FILE}"
          else
            echo "WARN: META_SYSTEM_USER_TOKEN secret not set -- meta-ads steps will fail."
          fi
          if [ -n "${GOOGLE_ADS_DEVELOPER_TOKEN:-}" ]; then
            GENV_FILE="${AI_BUSINESS_DIR}/google-ads/.env"
            : > "${GENV_FILE}"
            printf 'GOOGLE_ADS_DEVELOPER_TOKEN=%s\n' "${GOOGLE_ADS_DEVELOPER_TOKEN}" >> "${GENV_FILE}"
            printf 'GOOGLE_ADS_CLIENT_ID=%s\n' "${GOOGLE_ADS_CLIENT_ID}" >> "${GENV_FILE}"
            printf 'GOOGLE_ADS_CLIENT_SECRET=%s\n' "${GOOGLE_ADS_CLIENT_SECRET}" >> "${GENV_FILE}"
            printf 'GOOGLE_ADS_REFRESH_TOKEN=%s\n' "${GOOGLE_ADS_REFRESH_TOKEN}" >> "${GENV_FILE}"
            printf 'GOOGLE_ADS_LOGIN_CUSTOMER_ID=%s\n' "${GOOGLE_ADS_LOGIN_CUSTOMER_ID}" >> "${GENV_FILE}"
            printf 'GOOGLE_ADS_CUSTOMER_ID=%s\n' "${GOOGLE_ADS_CUSTOMER_ID}" >> "${GENV_FILE}"
          else
            echo "WARN: GOOGLE_ADS_DEVELOPER_TOKEN secret not set -- google-ads steps will fail."
          fi
          bash scripts/run-loop.sh ad-lp-apply-daily

      - name: Commit & push generated learnings to private config repo (SSH)
        working-directory: config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore: ad-lp-apply-daily auto update ($(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST'))"
            bash ../scripts/git-push-retry.sh git@config-gh:yusuken10121990-hub/ai-ops-config.git main
          fi

      - name: Sync ai-business changes back (ai-business-ops / sales-research-tool / meta-ads)
        run: |
          chmod +x scripts/sync-ai-business.sh
          scripts/sync-ai-business.sh
# Note (2026-07-17): no LINE-on-failure step here by design. Owner rule
# (~/.claude/CLAUDE.md "LINE通知ルール"): LINE is reserved for money-approval
# requests only. Failure visibility lives in the Actions run history /
# dashboard "稼働状況" tab instead.
