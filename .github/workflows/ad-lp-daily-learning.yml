name: ad-lp-daily-learning

# P2: 24h無人運用の横展開。ad-lp-analystの学習ループ(3hおき)をGitHub Actionsへ移設。
# team-learning-loop(毎正時+1時間おき3h)と衝突しないよう分:30にずらしてある。
# JST 0:30,3:30,6:30,9:30,12:30,15:30,18:30,21:30 = UTC 0:30,3:30,...,21:30(同じ時集合)
on:
  schedule:
    - cron: "30 0,3,6,9,12,15,18,21 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ad-lp-daily-learning
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout orchestrator (public, scripts only)
        uses: actions/checkout@v7

      - name: Setup SSH deploy keys (config + ai-business-ops)
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: |
            ${{ secrets.CONFIG_DEPLOY_KEY }}
            ${{ secrets.AI_BUSINESS_OPS_DEPLOY_KEY }}

      - name: Add github.com to known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: Checkout private config repo via deploy key (SSH)
        run: |
          git clone --depth 1 --branch main git@github.com:yusuken10121990-hub/ai-ops-config.git config

      - name: Checkout ai-business-ops (marketing/ad-lp-learnings.md, ad-lp-apply-queue.md)
        run: |
          chmod +x scripts/checkout-ai-business.sh
          scripts/checkout-ai-business.sh

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"

      - name: Run ad-lp-daily-learning
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          chmod +x scripts/run-loop.sh
          bash scripts/run-loop.sh ad-lp-daily-learning

      - name: Commit & push generated learnings to private config repo (SSH)
        working-directory: config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore: ad-lp-daily-learning auto update ($(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST'))"
            git push git@github.com:yusuken10121990-hub/ai-ops-config.git HEAD:main
          fi

      - name: Sync ai-business changes back (ai-business-ops)
        run: |
          chmod +x scripts/sync-ai-business.sh
          scripts/sync-ai-business.sh

      - name: Notify LINE on failure
        if: failure()
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          if [ -z "${LINE_CHANNEL_TOKEN:-}" ] || [ -z "${LINE_USER_ID:-}" ]; then
            echo "LINE secrets not set, skipping notification."
            exit 0
          fi
          curl -sS -X POST https://api.line.me/v2/bot/message/push \
            -H "Authorization: Bearer ${LINE_CHANNEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"to\":\"${LINE_USER_ID}\",\"messages\":[{\"type\":\"text\",\"text\":\"[ai-ops-orchestrator] ad-lp-daily-learning failed. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}]}"
