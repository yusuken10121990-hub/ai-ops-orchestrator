name: ad-pdca-daily

# P2: 24h無人運用の横展開。ZEROSYSリサーチ Meta広告の日次PDCA(毎朝10:10 JST)。
# JST 10:10 = UTC 1:10（team-learning-loopのUTC1:00ちょうどと衝突しないよう分をずらしてある）
on:
  schedule:
    - cron: "10 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ad-pdca-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout orchestrator (public, scripts only)
        uses: actions/checkout@v7

      - name: Setup SSH deploy keys (config + ai-business-ops + sales-research-tool + meta-ads, one host-alias per repo)
        env:
          CONFIG_DEPLOY_KEY: ${{ secrets.CONFIG_DEPLOY_KEY }}
          AI_BUSINESS_OPS_DEPLOY_KEY: ${{ secrets.AI_BUSINESS_OPS_DEPLOY_KEY }}
          SALES_RESEARCH_DEPLOY_KEY: ${{ secrets.SALES_RESEARCH_DEPLOY_KEY }}
          META_ADS_DEPLOY_KEY: ${{ secrets.META_ADS_DEPLOY_KEY }}
        run: |
          chmod +x scripts/setup-ssh-keys.sh
          scripts/setup-ssh-keys.sh

      - name: Checkout private config repo via deploy key (SSH)
        run: |
          git clone --depth 1 --branch main git@config-gh:yusuken10121990-hub/ai-ops-config.git config

      - name: Checkout ai-business (ai-business-ops + sales-research-tool + meta-ads)
        run: |
          chmod +x scripts/checkout-ai-business.sh
          scripts/checkout-ai-business.sh

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"

      - name: "Install deps (meta-ads: pull-data.js/fetch-placements.js/apply-*.js need facebook-nodejs-business-sdk)"
        run: |
          if [ -f "${AI_BUSINESS_DIR}/meta-ads/package.json" ]; then
            (cd "${AI_BUSINESS_DIR}/meta-ads" && (npm ci --no-audit --no-fund || npm install --no-audit --no-fund))
          fi

      # 2026-07-19: cv-forensics (新設・広告CV鑑識官) がSKILL.md (2)分析4者委任と
      # (3.6)3日毎フル監査(Google Ads CID 7357396296含む全数調査)の対象に追加された。
      # Google Ads側の認証情報(secrets)はこのワークフローにはまだ無いため、依存だけ
      # 入れておきスクリプト自体はGoogle Ads分を認証情報未設定として自己スキップする
      # (SKILL.md (3.6)節参照)。ad-lp-apply-daily.yml と同じ導入パターンを踏襲。
      - name: "Install deps (google-ads: cv-forensicsの3日毎フル監査がGoogle Ads分も参照するため)"
        run: |
          if [ -f "${AI_BUSINESS_DIR}/google-ads/package.json" ]; then
            (cd "${AI_BUSINESS_DIR}/google-ads" && (npm ci --no-audit --no-fund || npm install --no-audit --no-fund))
          fi

      - name: Run ad-pdca-daily
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GATE_URL: ${{ secrets.GATE_URL }}
          GATE_AGENT_KEY: ${{ secrets.GATE_AGENT_KEY }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          # Meta Ads API credentials (ai-business/meta-ads/.env locally). Set via:
          #   gh secret set META_APP_ID -R yusuken10121990-hub/ai-ops-orchestrator
          #   gh secret set META_APP_SECRET -R yusuken10121990-hub/ai-ops-orchestrator
          #   gh secret set META_SYSTEM_USER_TOKEN -R yusuken10121990-hub/ai-ops-orchestrator
          #   gh secret set META_AD_ACCOUNT_ID -R yusuken10121990-hub/ai-ops-orchestrator
          #   gh secret set META_API_VERSION -R yusuken10121990-hub/ai-ops-orchestrator   (optional, defaults to v21.0)
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          META_SYSTEM_USER_TOKEN: ${{ secrets.META_SYSTEM_USER_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          META_API_VERSION: ${{ secrets.META_API_VERSION }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_IG_ACCOUNT_ID: ${{ secrets.META_IG_ACCOUNT_ID }}
          META_PIXEL_ID: ${{ secrets.META_PIXEL_ID }}
        run: |
          chmod +x scripts/run-loop.sh
          # meta-ads scripts load .env via `import 'dotenv/config'`; since CI has no
          # .env file (gitignored, never pushed), write one from the secrets above so
          # pull-data.js/apply-*.js work unmodified. Values are secrets — this file
          # lives only on the ephemeral runner and is never committed (gitignored).
          if [ -n "${META_SYSTEM_USER_TOKEN:-}" ]; then
            ENV_FILE="${AI_BUSINESS_DIR}/meta-ads/.env"
            : > "${ENV_FILE}"
            printf 'META_APP_ID=%s\n' "${META_APP_ID}" >> "${ENV_FILE}"
            printf 'META_APP_SECRET=%s\n' "${META_APP_SECRET}" >> "${ENV_FILE}"
            printf 'META_SYSTEM_USER_TOKEN=%s\n' "${META_SYSTEM_USER_TOKEN}" >> "${ENV_FILE}"
            printf 'META_AD_ACCOUNT_ID=%s\n' "${META_AD_ACCOUNT_ID}" >> "${ENV_FILE}"
            printf 'META_API_VERSION=%s\n' "${META_API_VERSION:-v21.0}" >> "${ENV_FILE}"
            printf 'META_PAGE_ID=%s\n' "${META_PAGE_ID}" >> "${ENV_FILE}"
            printf 'META_IG_ACCOUNT_ID=%s\n' "${META_IG_ACCOUNT_ID}" >> "${ENV_FILE}"
            printf 'META_PIXEL_ID=%s\n' "${META_PIXEL_ID}" >> "${ENV_FILE}"
          else
            echo "WARN: META_SYSTEM_USER_TOKEN secret not set -- meta-ads data collection step will fail. Loop will still run and record 'continue observing' / gate items where possible."
          fi
          bash scripts/run-loop.sh ad-pdca-daily

      - name: Commit & push generated learnings to private config repo (SSH)
        working-directory: config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore: ad-pdca-daily auto update ($(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST'))"
            bash ../scripts/git-push-retry.sh git@config-gh:yusuken10121990-hub/ai-ops-config.git main
          fi

      - name: Sync ai-business changes back (ai-business-ops / sales-research-tool / meta-ads)
        run: |
          chmod +x scripts/sync-ai-business.sh
          scripts/sync-ai-business.sh
# Note (2026-07-17): no LINE-on-failure step here by design. Owner rule
# (~/.claude/CLAUDE.md "LINE通知ルール"): LINE is reserved for money-approval
# requests only. Failure visibility lives in the Actions run history /
# dashboard "稼働状況" tab instead.
