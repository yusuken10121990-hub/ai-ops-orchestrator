name: geo-daily

# PC-off migration (2026-07-23, pc-off-migration-plan.md Tier1). geo-daily
# reads/writes .claude/memory/geo-strategy.md + geo-tracking.md (config repo)
# and may make reversible content edits to LP repos (ai-business-ops /
# sales-research-tool) via the geo-content sub-agent. No money is spent
# (GEO is free-tier content/measurement work; paid PR/listings are proposed
# to owner-todos.md, never executed here).
# JST 7:30 = UTC 22:30 (previous day).
on:
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: geo-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout orchestrator (public, scripts only)
        uses: actions/checkout@v7

      - name: Setup SSH deploy keys (config + ai-business-ops + sales-research-tool + meta-ads)
        env:
          CONFIG_DEPLOY_KEY: ${{ secrets.CONFIG_DEPLOY_KEY }}
          AI_BUSINESS_OPS_DEPLOY_KEY: ${{ secrets.AI_BUSINESS_OPS_DEPLOY_KEY }}
          SALES_RESEARCH_DEPLOY_KEY: ${{ secrets.SALES_RESEARCH_DEPLOY_KEY }}
          META_ADS_DEPLOY_KEY: ${{ secrets.META_ADS_DEPLOY_KEY }}
        run: |
          chmod +x scripts/setup-ssh-keys.sh
          scripts/setup-ssh-keys.sh

      - name: Checkout private config repo via deploy key (SSH)
        run: |
          git clone --depth 1 --branch main git@config-gh:yusuken10121990-hub/ai-ops-config.git config

      - name: Checkout ai-business (ai-business-ops + sales-research-tool + meta-ads)
        run: |
          chmod +x scripts/checkout-ai-business.sh
          scripts/checkout-ai-business.sh

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"

      - name: Run geo-daily
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          chmod +x scripts/run-loop.sh
          bash scripts/run-loop.sh geo-daily

      - name: Commit & push generated learnings to private config repo (SSH)
        working-directory: config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore: geo-daily auto update ($(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST'))"
            bash ../scripts/git-push-retry.sh git@config-gh:yusuken10121990-hub/ai-ops-config.git main
          fi

      - name: Sync ai-business changes back (ai-business-ops / sales-research-tool / meta-ads)
        run: |
          chmod +x scripts/sync-ai-business.sh
          scripts/sync-ai-business.sh
# Note: no LINE-on-failure step by design. No money is ever spent by this
# loop (see SKILL "お金は動かさない").
