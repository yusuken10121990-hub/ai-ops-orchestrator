name: team-learning-loop

# PoC (P0): 24h無人運用の実証。PCを落としてもGitHub Actions(cron)が
# team-learning-loopを実行し続けることを証明する。
#
# JST 1,4,7,10,13,16,19,22時 (3hおき・8ドメイン) = UTC 1,4,7,10,13,16,19,22時
# (JST = UTC+9 なので、この時刻セットはUTCでもJSTでも同じ並びになる)
on:
  schedule:
    - cron: "0 1,4,7,10,13,16,19,22 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: team-learning-loop
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout orchestrator (public, scripts only)
        uses: actions/checkout@v7

      - name: Setup SSH deploy key for private config repo
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.CONFIG_DEPLOY_KEY }}

      - name: Add github.com to known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: Checkout private config repo via deploy key (SSH)
        run: |
          git clone --depth 1 --branch main git@github.com:yusuken10121990-hub/ai-ops-config.git config

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"

      - name: Run team-learning-loop
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          chmod +x scripts/run-loop.sh
          bash scripts/run-loop.sh team-learning-loop

      - name: Commit & push generated learnings to private config repo (SSH)
        working-directory: config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore: team-learning-loop auto update ($(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST'))"
            bash ../scripts/git-push-retry.sh git@github.com:yusuken10121990-hub/ai-ops-config.git main
          fi
# Note (2026-07-17): no LINE-on-failure step here by design. Owner rule
# (~/.claude/CLAUDE.md "LINE通知ルール"): LINE is reserved for money-approval
# requests only. Failure visibility lives in the Actions run history /
# dashboard "稼働状況" tab instead.
